<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="theme-color" content="#090a0e" />
		<title>Offline · Marquee</title>
		<link rel="icon" href="/favicon.ico" sizes="any" />
		<link rel="apple-touch-icon" href="/apple-touch-icon.png" />
		<style>
			:root {
				color-scheme: dark;
			}
			* {
				box-sizing: border-box;
			}
			html,
			body {
				height: 100%;
				margin: 0;
			}
			body {
				display: flex;
				flex-direction: column;
				align-items: center;
				justify-content: center;
				gap: 1.25rem;
				padding: 2rem;
				text-align: center;
				background: #090a0e;
				color: #ededf0;
				font-family:
					system-ui,
					-apple-system,
					'Segoe UI',
					Roboto,
					sans-serif;
			}
			img {
				width: 72px;
				height: 72px;
			}
			h1 {
				margin: 0;
				font-size: 1.5rem;
				font-weight: 600;
			}
			p {
				margin: 0;
				max-width: 28rem;
				color: #a1a1ab;
				line-height: 1.5;
			}
			button {
				margin-top: 0.5rem;
				padding: 0.625rem 1.25rem;
				font: inherit;
				font-weight: 600;
				color: #fff;
				background: #8b5cf6;
				border: none;
				border-radius: 0.625rem;
				cursor: pointer;
			}
			button:hover {
				background: #7c4ef4;
			}
		</style>
	</head>
	<body>
		<img src="/icons/icon-192.png" alt="Marquee" />
		<h1>You're offline</h1>
		<p>
			Marquee can't reach the network right now. Check your connection — anything you've already
			opened is still available.
		</p>
		<button type="button" onclick="location.reload()">Try again</button>
	</body>
</html>

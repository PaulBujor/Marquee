<!doctype html>
<html lang="en">
	<head>
		<meta charset="utf-8" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<meta name="text-scale" content="scale" />
		<!-- Apply the theme before first paint to avoid a light-mode flash. Mirrors
		theme.svelte.ts; the layout's $effect takes over after hydration. -->
		<script nonce="%sveltekit.nonce%">
			try {
				var m = localStorage.getItem('marquee:theme-mode');
				if (m !== 'light' && m !== 'dark' && m !== 'auto') m = 'auto';
				var dark = m === 'auto' ? matchMedia('(prefers-color-scheme: dark)').matches : m === 'dark';
				document.documentElement.classList.toggle('dark', dark);
			} catch (e) {}
		</script>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400..900;1,9..144,400..900&family=Public+Sans:wght@400;500;600;700&display=swap"
			rel="stylesheet"
		/>
		<title>Marquee</title>
		%sveltekit.head%
	</head>
	<body data-sveltekit-preload-data="hover">
		<div style="display: contents">%sveltekit.body%</div>
	</body>
</html>

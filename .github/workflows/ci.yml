name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      # `wrangler types` folds .dev.vars into the generated `Env`. CI has no
      # .dev.vars (git-ignored), so seed it from the example to type env vars.
      - run: cp .dev.vars.example .dev.vars
      - run: pnpm run lint
      - run: pnpm run check
      - run: pnpm run build
      - run: pnpm test
